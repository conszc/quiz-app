<!DOCTYPE html>
<html lang="en">

<head>

    <!-- =========================
         META INFORMATION
    ========================== -->
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>QuizMaster | Quiz</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <!-- =========================
         QUIZ CONTAINER
    ========================== -->
    <div class="quiz-container">

        <!-- Quiz Header -->
        <div class="quiz-header">

            <h1>🧠 Quiz Challenge</h1>

            <p>
                Answer the questions below and test your knowledge!
            </p>

        </div>

        <!-- Progress Bar -->
        <div class="progress-container">

            <div class="progress-bar" id="progress-bar"></div>

        </div>

        <!-- Question Section -->
        <div class="question-box">

            <h2 id="question">
                Loading question...
            </h2>

        </div>

        <div class="answers-container" id="answers-container">


        </div>

        <div class="quiz-buttons">

            <button id="next-btn">
                Next Question ➜
            </button>

        </div>

    </div>

    <!-- =========================
         QUIZ SCRIPT
    ========================== -->
    <script>

        const quizData = [

            {
                question: "What does HTML stand for?",
                answers: [
                    "HyperText Markup Language",
                    "HighText Machine Language",
                    "Hyper Transfer Markup Language",
                    "Home Tool Markup Language"
                ],
                correct: 0
            },

            {
                question: "Which language is used for styling websites?",
                answers: [
                    "HTML",
                    "Python",
                    "CSS",
                    "Java"
                ],
                correct: 2
            },

            {
                question: "Which symbol is used for IDs in CSS?",
                answers: [
                    ".",
                    "#",
                    "@",
                    "$"
                ],
                correct: 1
            }

        ];

        let currentQuestion = 0;
        let score = 0;

        const questionEl =
              document.getElementById("question");

        const answersContainer =
              document.getElementById("answers-container");

        const nextBtn =
              document.getElementById("next-btn");

        const progressBar =
              document.getElementById("progress-bar");

        function loadQuestion() {

            answersContainer.innerHTML = "";

            const currentQuiz =
                  quizData[currentQuestion];

            // Display question
            questionEl.innerText =
                  currentQuiz.question;

            currentQuiz.answers.forEach(
                (answer, index) => {

                const button =
                      document.createElement("button");

                button.innerText = answer;

                button.classList.add("answer-btn");

                button.addEventListener("click", () => {

                    const allButtons =
                          document.querySelectorAll(".answer-btn");

                    allButtons.forEach(btn => {
                        btn.disabled = true;
                    });

                    if (index === currentQuiz.correct) {

                        button.classList.add("correct");

                        score++;
                    }
                    else {

                        button.classList.add("wrong");

                        allButtons[currentQuiz.correct]
                            .classList.add("correct");
                    }
                });

                answersContainer.appendChild(button);
            });

            const progress =
                  ((currentQuestion + 1)
                  / quizData.length) * 100;

            progressBar.style.width =
                  progress + "%";
        }

        nextBtn.addEventListener("click", () => {

            currentQuestion++;

            if (currentQuestion < quizData.length) {

                loadQuestion();
            }
            else {

                localStorage.setItem("quizScore", score);

                window.location.href = "results.html";
            }
        });

        loadQuestion();

    </script>

</body>

</html>
