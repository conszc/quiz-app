<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Leaderboard</title>

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <!-- =========================
         LEADERBOARD CONTAINER
    ========================== -->
    <div class="leaderboard-container">

        <h1>Top Players</h1>

        <table class="leaderboard-table">

            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Username</th>
                    <th>Score</th>
                    <th>Quizzes Played</th>
                </tr>
            </thead>

            <tbody id="leaderboard-body">

                <tr>
                    <td>1 </td>
                    <td>playerOne</td>
                    <td>10</td>
                    <td>12</td>
                </tr>

                <tr>
                    <td>2 </td>
                    <td>playerTwo</td>
                    <td>9</td>
                    <td>15</td>
                </tr>

                <tr>
                    <td>3 </td>
                    <td>playerThree</td>
                    <td>8</td>
                    <td>10</td>
                </tr>

                <tr>
                    <td>4</td>
                    <td>user123</td>
                    <td>7</td>
                    <td>8</td>
                </tr>

            </tbody>

        </table>

        <div class="leaderboard-buttons">

            <button onclick="goHome()">
                Home
            </button>

            <button onclick="refreshBoard()">
                Refresh
            </button>

        </div>

    </div>

    <!-- =========================
         LEADERBOARD SCRIPT
    ========================== -->
    <script>
        const leaderboardData = [
            { username: "playerOne", score: 10, plays: 12 },
            { username: "playerTwo", score: 9, plays: 15 },
            { username: "playerThree", score: 8, plays: 10 },
            { username: "user123", score: 7, plays: 8 }
        ];

        const tbody = document.getElementById("leaderboard-body");

        function loadLeaderboard() {

            tbody.innerHTML = "";

            leaderboardData.forEach((user, index) => {

                let rankIcon = "";

                if (index === 0) rankIcon = "Victory!";
                else if (index === 1) rankIcon = "🥈";
                else if (index === 2) rankIcon = "🥉";

                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${index + 1} ${rankIcon}</td>
                    <td>${user.username}</td>
                    <td>${user.score}</td>
                    <td>${user.plays}</td>
                `;

                tbody.appendChild(row);
            });
        }

        function goHome() {
            window.location.href = "index.html";
        }

        function refreshBoard() {
            loadLeaderboard();
        }

        loadLeaderboard();
    </script>

</body>

</html>
